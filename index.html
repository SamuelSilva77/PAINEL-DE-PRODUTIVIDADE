<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Painel de Produtividade</title>

    <!--LINKS-->
    <script src="script.js" defer></script>
    <link rel="shortcut icon" href="img/sol.png" type="image/x-icon" />
    <link rel="stylesheet" href="estilo.css" />
  </head>
  <body>

    <header>
        <p id="horas"></p>
        <p id="data"></p>

        <br>
        <hr />
    </header>

    <div class="lista">
      
      <h2>To-Do-List</h2>

      <div class="listaBotao">
        <button style="border-top-left-radius: 5px; border-bottom-left-radius: 5px;" onclick="todas()">All</button>
        <button onclick="pendente()">Pending</button>
        <button onclick="concluidas()" style="border-top-right-radius: 5px; border-bottom-right-radius: 5px;">Completed</button>
      </div>


      <div class="adicionarTarefa ">
        <input type="text" placeholder="Adicione uma tarefa.." id="inputAdd">
        <button onclick="adicionarTarefa()">Add</button>
      </div>

      <div class="tarefas">

      
      </div>
    
      <br>
    </div>
  </body>
</html>
